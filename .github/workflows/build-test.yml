name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Select an available iPhone simulator
        id: simulator
        run: |
          DEVICE=$(xcrun simctl list devices available | grep -oE 'iPhone [0-9][^(]*' | head -1 | xargs)
          if [ -z "$DEVICE" ]; then
            echo "No iPhone simulator available" >&2
            xcrun simctl list devices available >&2
            exit 1
          fi
          echo "Using simulator: $DEVICE"
          echo "device=$DEVICE" >> "$GITHUB_OUTPUT"

      - name: Run tests
        run: |
          set -o pipefail
          xcodebuild -project ThaiSheet.xcodeproj -scheme ThaiSheet \
            -destination "platform=iOS Simulator,name=${{ steps.simulator.outputs.device }}" \
            test | tail -100
